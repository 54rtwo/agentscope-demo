<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgentScope 学习项目</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 8px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 { color: #1976d2; margin-bottom: 8px; }
        .subtitle { color: #666; margin-bottom: 24px; }

        .mode-switch { display: flex; gap: 8px; margin-bottom: 16px; }
        .mode-btn {
            padding: 8px 16px;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            cursor: pointer;
            background: white;
        }
        .mode-btn.active { background: #1976d2; color: white; border-color: #1976d2; }

        .chat-area {
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 16px;
            min-height: 300px;
            max-height: 500px;
            overflow-y: auto;
            margin-bottom: 16px;
            background: #fafafa;
        }
        .message {
            margin: 8px 0;
            padding: 12px;
            border-radius: 8px;
            max-width: 80%;
            word-break: break-word;
        }
        .message.user {
            background: #1976d2;
            color: white;
            margin-left: auto;
            text-align: right;
        }
        .message.agent { background: #e8f5e9; color: #333; }
        .message.agent .md-content { line-height: 1.6; }

        .md-content h1, .md-content h2, .md-content h3, .md-content h4 {
            margin: 12px 0 8px; color: #1a1a1a;
        }
        .md-content h1 { font-size: 1.4em; }
        .md-content h2 { font-size: 1.2em; }
        .md-content h3 { font-size: 1.1em; }
        .md-content p { margin: 8px 0; }
        .md-content code {
            background: rgba(0,0,0,0.08);
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 0.9em;
        }
        .md-content pre {
            background: #2d2d2d;
            color: #f8f8f2;
            padding: 12px;
            border-radius: 6px;
            overflow-x: auto;
            margin: 8px 0;
        }
        .md-content pre code { background: none; padding: 0; color: inherit; }
        .md-content ul, .md-content ol { padding-left: 20px; margin: 8px 0; }
        .md-content li { margin: 4px 0; }
        .md-content blockquote {
            border-left: 3px solid #1976d2;
            padding-left: 12px;
            margin: 8px 0;
            color: #555;
        }
        .md-content a { color: #1976d2; }
        .md-content hr { border: none; border-top: 1px solid #e0e0e0; margin: 12px 0; }

        .message.system {
            background: #fff3e0;
            color: #666;
            font-size: 12px;
            max-width: 100%;
            text-align: center;
        }
        .message.error { background: #ffebee; color: #c62828; }

        .input-area { display: flex; gap: 8px; }
        textarea {
            flex: 1; padding: 12px; border: 1px solid #e0e0e0;
            border-radius: 8px; resize: none; font-size: 14px; height: 60px;
        }
        textarea:focus { outline: none; border-color: #1976d2; }
        button {
            padding: 12px 24px; background: #1976d2; color: white;
            border: none; border-radius: 8px; cursor: pointer; font-size: 14px;
            white-space: nowrap;
        }
        button:hover { background: #1565c0; }
        button:disabled { background: #ccc; cursor: not-allowed; }

        .status { font-size: 12px; color: #666; margin-top: 8px; }
        .status.loading { color: #1976d2; }
        .status.success { color: #4caf50; }
        .status.error { color: #c62828; }

        .quick-tests {
            margin-top: 16px; padding-top: 16px;
            border-top: 1px solid #e0e0e0;
        }
        .quick-tests h3 { font-size: 14px; color: #666; margin-bottom: 8px; }
        .quick-btn {
            display: inline-block; padding: 6px 12px; margin: 4px;
            background: #e0e0e0; border-radius: 4px; cursor: pointer; font-size: 12px;
        }
        .quick-btn:hover { background: #bdbdbd; }
    </style>
</head>
<body>
    <div class="container">
        <h1>AgentScope 学习项目</h1>
        <p class="subtitle">Task 2: 最小 Agent 调用 - 理解 Agent + Model + Msg</p>

        <div class="mode-switch">
            <button class="mode-btn active" id="reactMode" onclick="setAgentMode('react')">ReActAgent</button>
            <button class="mode-btn" id="simpleMode" onclick="setAgentMode('simple')">纯 Model</button>
            <button class="mode-btn" id="streamMode" onclick="setMode('stream')">流式</button>
        </div>

        <div class="chat-area" id="chatArea">
            <div class="message system">系统已就绪。输入消息测试 Agent 调用。</div>
        </div>

        <div class="input-area">
            <textarea id="userInput" placeholder="输入消息，如：你好，请介绍一下你自己"></textarea>
            <button id="sendBtn" onclick="sendMessage()">发送</button>
        </div>

        <div class="status" id="status"></div>

        <div class="quick-tests">
            <h3>快捷测试：</h3>
            <span class="quick-btn" onclick="quickTest('你好，请介绍一下你自己')">自我介绍</span>
            <span class="quick-btn" onclick="quickTest('请把\'Hello World\'保存为 hello.html')">保存文件</span>
            <span class="quick-btn" onclick="quickTest('当前是什么时间？')">当前时间</span>
            <span class="quick-btn" onclick="quickTest('列出 5 个 Java 最佳实践')">Java 最佳实践</span>
        </div>
    </div>

    <script>
        const chatArea = document.getElementById('chatArea');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const statusDiv = document.getElementById('status');

        let loading = false;
        let mode = 'stream';
        let agentMode = 'react';   // 'react' or 'simple'
        let currentAgentMsg = null;

        // ---- Typewriter engine ----
        let twTimer = null;
        let twPos = 0;
        let twTarget = '';
        let twDone = false;
        let twEl = null;

        function twStart(el) {
            if (twTimer) clearInterval(twTimer);
            twPos = 0;
            twTarget = '';
            twDone = false;
            twEl = el;
            el.textContent = '';

            twTimer = setInterval(() => {
                if (twPos >= twTarget.length) {
                    if (twDone) {
                        clearInterval(twTimer);
                        twTimer = null;
                        renderMarkdown(twEl, twTarget);
                    }
                    return;
                }
                twPos = Math.min(twPos + 2, twTarget.length);
                twEl.textContent = twTarget.substring(0, twPos);
                chatArea.scrollTop = chatArea.scrollHeight;
            }, 20);
        }

        function twPush(text) {
            if (twEl) twTarget += text;
        }

        function twFinish() {
            twDone = true;
        }

        function twClear() {
            if (twTimer) { clearInterval(twTimer); twTimer = null; }
        }

        // ---- Markdown rendering ----
        function renderMarkdown(el, text) {
            if (typeof marked !== 'undefined' && typeof marked.parse === 'function') {
                el.innerHTML = marked.parse(text);
            } else {
                // Fallback: basic formatting
                el.innerHTML = text
                    .replace(/</g, '&lt;')
                    .replace(/\n/g, '<br>');
            }
        }

        // ---- SSE parser (handles chunked reads) ----
        function parseSseChunk(chunk) {
            const events = [];
            const lines = chunk.split('\n');
            for (const line of lines) {
                if (line.startsWith('data:')) {
                    const text = line.slice(5).trim();
                    if (text) events.push(text);
                }
            }
            return events;
        }

        // ---- Helpers ----
        function addMessage(content, type) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${type}`;
            if (type === 'agent' || type === 'agent streaming') {
                const cd = document.createElement('div');
                cd.className = 'md-content';
                cd.textContent = content;
                msgDiv.appendChild(cd);
            } else {
                msgDiv.textContent = content;
            }
            chatArea.appendChild(msgDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
            return msgDiv;
        }

        function setStatus(text, type) {
            statusDiv.textContent = text;
            statusDiv.className = `status ${type}`;
        }

        function setAgentMode(m) {
            agentMode = m;
            document.getElementById('reactMode').classList.toggle('active', m === 'react');
            document.getElementById('simpleMode').classList.toggle('active', m === 'simple');
        }

        function setMode(m) {
            mode = m;
            document.getElementById('streamMode').classList.toggle('active', m === 'stream');
        }

        // ---- Stream send (simple model only) ----
        async function sendStreamMessage(text) {
            currentAgentMsg = addMessage('', 'agent streaming');
            setStatus('正在调用 Agent（流式）...', 'loading');

            const contentEl = currentAgentMsg.querySelector('.md-content');
            twStart(contentEl);

            try {
                const resp = await fetch(`/api/test/chat/stream?input=${encodeURIComponent(text)}`);
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

                const reader = resp.body.getReader();
                const decoder = new TextDecoder();

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    const chunk = decoder.decode(value, { stream: true });
                    const texts = parseSseChunk(chunk);
                    for (const t of texts) {
                        twPush(t);
                    }
                }

                twFinish();
                setStatus('流式输出完成', 'success');

            } catch (err) {
                twClear();
                const cd = currentAgentMsg?.querySelector('.md-content');
                if (cd) cd.textContent = `错误: ${err.message}`;
                if (currentAgentMsg) currentAgentMsg.classList.add('error');
                setStatus(`失败: ${err.message}`, 'error');
            } finally {
                loading = false;
                sendBtn.disabled = false;
                currentAgentMsg = null;
            }
        }

        // ---- Batch send ----
        async function sendBatchMessage(endpoint, text) {
            setStatus('正在调用 Agent...', 'loading');
            try {
                const resp = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: text
                });
                if (!resp.ok) throw new Error(`HTTP ${resp.status}: ${resp.statusText}`);
                const data = await resp.json();
                const msgDiv = addMessage('', 'agent');
                renderMarkdown(msgDiv.querySelector('.md-content'), data.content || '');
                setStatus(`成功! 耗时: ${data.durationMs}ms`, 'success');
            } catch (err) {
                addMessage(`错误: ${err.message}`, 'error');
                setStatus(`失败: ${err.message}`, 'error');
            } finally {
                loading = false;
                sendBtn.disabled = false;
            }
        }

        // ---- Main send ----
        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text || loading) return;
            addMessage(text, 'user');
            userInput.value = '';
            loading = true;
            sendBtn.disabled = true;

            if (mode === 'stream') {
                // 流式输出只支持纯 Model
                await sendStreamMessage(text);
            } else {
                // 一次性返回：根据 agentMode 选择 ReActAgent 或纯 Model
                const endpoint = agentMode === 'react'
                    ? '/api/test/chat'
                    : '/api/test/chat/simple';
                await sendBatchMessage(endpoint, text);
            }
        }

        function quickTest(t) { userInput.value = t; sendMessage(); }

        userInput.addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.ctrlKey && !loading) {
                e.preventDefault(); sendMessage();
            }
        });
    </script>
</body>
</html>
